<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>概念C - 混合式</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;}
body{background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;gap:20px;padding:20px;flex-wrap:wrap;}
.phone{width:360px;height:780px;background:#fff;border-radius:32px;box-shadow:0 10px 40px rgba(0,0,0,.12);overflow:hidden;display:flex;flex-direction:column;position:relative;}
.status-bar{height:40px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:11px;color:#fff;flex-shrink:0;}
.screen{flex:1;overflow-y:auto;display:flex;flex-direction:column;position:relative;}
.screen::-webkit-scrollbar{display:none;}

/* C: Hybrid - floating widget + chat */
.phone-c .bg-grad{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px 20px 80px;flex-shrink:0;position:relative;}
.phone-c .bg-grad .hello{font-size:14px;color:rgba(255,255,255,.8);}
.phone-c .bg-grad .user-name{font-size:22px;font-weight:700;color:#fff;margin:2px 0 4px;}
.phone-c .bg-grad .status{font-size:13px;color:rgba(255,255,255,.7);}

/* floating card */
.phone-c .float-card{margin:-50px 16px 0;background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);position:relative;z-index:10;flex-shrink:0;}
.phone-c .float-card .fc-row{display:flex;gap:12px;}
.phone-c .float-card .fc-item{flex:1;text-align:center;padding:8px 0;border-radius:10px;background:#f8f9ff;cursor:pointer;transition:.15s;}
.phone-c .float-card .fc-item:active{background:#eef2ff;}
.phone-c .float-card .fc-item .fc-icon{font-size:22px;margin-bottom:2px;}
.phone-c .float-card .fc-item .fc-num{font-size:16px;font-weight:700;color:#1a1a1a;}
.phone-c .float-card .fc-item .fc-lbl{font-size:10px;color:#999;}
.phone-c .float-card .fc-item .fc-chg{font-size:10px;color:#52c41a;}

/* timeline */
.phone-c .tl{padding:16px 16px 8px;flex-shrink:0;}
.phone-c .tl .tl-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:10px;}
.phone-c .tl-item{display:flex;gap:10px;padding-bottom:12px;position:relative;}
.phone-c .tl-item::before{content:'';position:absolute;left:14px;top:24px;bottom:0;width:2px;background:#f0f0f0;}
.phone-c .tl-item:last-child::before{display:none;}
.phone-c .tl-item .tl-dot{width:8px;height:8px;border-radius:50%;background:#667eea;margin-top:4px;flex-shrink:0;position:relative;z-index:1;}
.phone-c .tl-item .tl-dot.green{background:#52c41a;}
.phone-c .tl-item .tl-dot.orange{background:#fa8c16;}
.phone-c .tl-item .tl-c{flex:1;}
.phone-c .tl-item .tl-c .tl-t{font-size:13px;font-weight:500;color:#1a1a1a;}
.phone-c .tl-item .tl-c .tl-d{font-size:12px;color:#999;margin:1px 0 2px;}
.phone-c .tl-item .tl-c .tl-s{font-size:11px;font-weight:600;}

/* bottom chat bar */
.phone-c .chat-bar{position:absolute;bottom:0;left:0;right:0;padding:8px 16px 12px;background:#fff;border-top:1px solid #f0f0f0;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.phone-c .chat-bar input{flex:1;padding:10px 16px;border-radius:24px;border:1px solid #e8e8e8;font-size:14px;outline:none;background:#f5f6fa;}
.phone-c .chat-bar input:focus{border-color:#667eea;background:#fff;}
.phone-c .chat-bar .send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;}

/* bottom nav */
.phone-c .bottom-nav{display:flex;padding:6px 0 10px;background:#fff;border-top:1px solid #f0f0f0;flex-shrink:0;}
.phone-c .bottom-nav .nav-item{flex:1;text-align:center;font-size:10px;color:#999;cursor:pointer;}
.phone-c .bottom-nav .nav-item.active{color:#667eea;}
.phone-c .bottom-nav .nav-item .nav-icon{font-size:20px;margin-bottom:1px;}

.label{text-align:center;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;padding:4px 0;}
</style>
</head>
<body>

<div>
<div class="label">🎨 概念C · 动态岛混合</div>
<div class="phone phone-c">
  <div class="screen">
    <div class="status-bar"><span>09:41</span><span>📶 🔋</span></div>

    <div class="bg-grad">
      <div class="hello">👋 早上好</div>
      <div class="user-name">欢迎回来</div>
      <div class="status">你已连续练习 6 天 · 本周能力 +8%</div>
    </div>

    <!-- floating metrics card -->
    <div class="float-card">
      <div class="fc-row">
        <div class="fc-item"><div class="fc-icon">🎙️</div><div class="fc-num">12</div><div class="fc-lbl">本周练习</div><div class="fc-chg">↑ 3</div></div>
        <div class="fc-item"><div class="fc-icon">📈</div><div class="fc-num">76</div><div class="fc-lbl">综合能力</div><div class="fc-chg" style="color:#52c41a;">↑ 8</div></div>
        <div class="fc-item"><div class="fc-icon">⚠️</div><div class="fc-num">2</div><div class="fc-lbl">待强化</div><div class="fc-chg" style="color:#fa8c16;">需关注</div></div>
        <div class="fc-item"><div class="fc-icon">🏆</div><div class="fc-num">Lv.3</div><div class="fc-lbl">闯关等级</div><div class="fc-chg" style="color:#667eea;">→</div></div>
      </div>
    </div>

    <!-- Recent activity / weak spots -->
    <div class="tl">
      <div class="tl-title">📋 你的提升轨迹</div>
      <div class="tl-item">
        <div class="tl-dot green"></div>
        <div class="tl-c">
          <div class="tl-t">✅ 异议处理 从 54 → 62</div>
          <div class="tl-d">练习 3 次"客户说太贵了"场景</div>
          <div class="tl-s" style="color:#52c41a;">↑ 8 分 · 持续进步</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div class="tl-c">
          <div class="tl-t">✅ 话术规范 82 → 85</div>
          <div class="tl-d">合规意识保持良好</div>
          <div class="tl-s" style="color:#52c41a;">↑ 3 分</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-dot orange"></div>
        <div class="tl-c">
          <div class="tl-t">⚠️ 促成技巧 60 → 58</div>
          <div class="tl-d">缺少练习，建议本周安排 2 次</div>
          <div class="tl-s" style="color:#fa8c16;">↓ 2 分 · 需要强化</div>
        </div>
      </div>
    </div>

    <div style="flex:1;"></div>

    <div class="chat-bar">
      <input type="text" placeholder="跟 AI 教练说你想练什么..." />
      <div class="send-btn">↑</div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item active"><div class="nav-icon">🏠</div>首页</div>
      <div class="nav-item"><div class="nav-icon">📊</div>能力</div>
      <div class="nav-item"><div class="nav-icon">🎯</div>闯关</div>
      <div class="nav-item"><div class="nav-icon">👤</div>我的</div>
    </div>
  </div>
</div>
</div>

</body>
</html>
