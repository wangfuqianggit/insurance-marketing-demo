<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 陪练系统 - 演示原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;}
body{background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
.phone{width:390px;height:844px;background:#f5f6fa;border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column;position:relative;}
.status-bar{height:44px;background:linear-gradient(135deg,#5B52E5,#7C6FEA);display:flex;align-items:center;justify-content:space-between;padding:0 24px;color:#fff;font-size:12px;flex-shrink:0;}
.app-header{height:50px;background:linear-gradient(135deg,#6C63FF,#8B7CFA);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:600;flex-shrink:0;position:relative;}
.app-header .back{position:absolute;left:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 10px;border-radius:6px;display:none;}
.app-header .back.show{display:block;}
.app-content{flex:1;overflow-y:auto;background:#f5f6fa;}
.app-content::-webkit-scrollbar{display:none;}
.tab-bar{height:52px;border-top:1px solid #eee;display:flex;background:#fff;flex-shrink:0;}
.tab-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#999;cursor:pointer;gap:1px;transition:.2s;}
.tab-bar .tab.active{color:#6C63FF;}
.tab-bar .tab .icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;margin-bottom:1px;background:transparent;transition:.2s;}
.tab-bar .tab.active .icon{background:linear-gradient(135deg,#eef2ff,#e0e7ff);}
.ic{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);font-size:13px;flex-shrink:0;}
.ic-sm{width:20px;height:20px;border-radius:5px;font-size:11px;}
.ic-green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);}
.ic-orange{background:linear-gradient(135deg,#fff7ed,#ffedd5);}
.ic-red{background:linear-gradient(135deg,#fff1f2,#fecdd3);}
.ic-gold{background:linear-gradient(135deg,#fefce8,#fef9c3);}
.screen{display:none;height:100%;flex-direction:column;}
.screen.active{display:flex;}
.page{padding:14px;}
.stitle{font-size:15px;font-weight:600;color:#1a1a1a;margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.stitle:first-child{margin-top:2px;}
.bp0{background:#ff4d4f;color:#fff;font-size:10px;padding:1px 8px;border-radius:10px;font-weight:500;}
.bp1{background:#faad14;color:#fff;font-size:10px;padding:1px 8px;border-radius:10px;font-weight:500;}
.bp2{background:#52c41a;color:#fff;font-size:10px;padding:1px 8px;border-radius:10px;font-weight:500;}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#6C63FF;}
.sc{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:.15s;border:1px solid transparent;}
.sc:active{transform:scale(.97);border-color:#6C63FF;}
.sc .sct{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.sc .sct .nm{font-size:14px;font-weight:500;color:#1a1a1a;}
.sc .scd{font-size:12px;color:#999;}
.sc .sctag{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 20px;border-radius:8px;font-size:14px;border:none;cursor:pointer;font-weight:500;transition:.15s;}
.btnp{background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;}
.btno{background:#fff;color:#6C63FF;border:1px solid #6C63FF;}
.btnw{width:100%;}
.btnl{padding:12px 24px;font-size:16px;}
.msg{display:flex;gap:8px;max-width:90%;}
.msg.ai{align-self:flex-start;}
.msg.us{align-self:flex-end;flex-direction:row-reverse;}
.msg .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.ai .av{background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#6C63FF;}
.msg.us .av{background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;}
.msg .bub{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;}
.msg.ai .bub{background:#fff;border:1px solid #eee;border-top-left-radius:3px;}
.msg.us .bub{background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;border-top-right-radius:3px;}
.msg .bub .cmt{font-size:12px;color:#fa8c16;margin-top:5px;padding-top:5px;border-top:1px dashed #ffd591;}
.msg .bub .cse{font-size:12px;color:#6C63FF;margin-top:3px;cursor:pointer;text-decoration:underline;}
.msg.us .bub .cse{color:#fff;opacity:.85;}
.rb{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.rb .lb{font-size:12px;color:#999;margin-bottom:4px;}
.rb .vl{font-size:24px;font-weight:700;color:#1a1a1a;}
.rb .vl .u{font-size:14px;font-weight:400;color:#999;}
.di{display:flex;align-items:center;gap:8px;padding:5px 0;}
.di .dn{width:56px;font-size:13px;color:#666;flex-shrink:0;}
.di .db{flex:1;height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden;}
.di .db .fl{height:100%;border-radius:4px;transition:1s;}
.di .ds{width:28px;text-align:right;font-size:13px;font-weight:600;color:#1a1a1a;}
/* history search */
.hsearch{display:none;padding:8px 14px;background:#fff;border-bottom:1px solid #eee;gap:8px;align-items:center;}
.hsearch.on{display:flex;}
.hsearch input{flex:1;padding:7px 12px;border-radius:20px;border:1px solid #e8e8e8;font-size:14px;outline:none;background:#f5f6fa;}
.hsearch input:focus{border-color:#6C63FF;background:#fff;}
.fb{display:flex;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10;flex-wrap:wrap;align-items:center;}
.fb.hide{display:none;}
.fbtn{padding:5px 16px;border-radius:14px;font-size:13px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;user-select:none;flex-shrink:0;}
.fbtn.on{background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;border-color:#6C63FF;font-weight:500;}
.fbtn.search-btn{padding:5px 10px;font-size:16px;}
.ts{display:flex;background:#f0f0f0;border-radius:8px;padding:2px;margin:6px 14px;flex-shrink:0;}
.ts .ti{flex:1;text-align:center;padding:6px 0;font-size:13px;border-radius:6px;cursor:pointer;color:#666;}
.ts .ti.on{background:#fff;color:#5B52E5;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tc{display:none;}
.tc.on{display:block;}
.ib{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #dde4ff;}
.ib h2{font-size:18px;margin-bottom:3px;color:#4A42D4;}
.ib p{font-size:13px;color:#666;line-height:1.5;}
.qs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.qs .qi{background:#fff;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.qs .qi .n{font-size:20px;font-weight:700;color:#5B52E5;}
.qs .qi .l{font-size:11px;color:#999;margin-top:2px;}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;}
.ov.on{display:flex;}
.ob{background:#fff;border-radius:16px;padding:24px;width:300px;text-align:center;}
.ob h3{font-size:16px;margin-bottom:8px;}
.ob p{font-size:13px;color:#999;margin-bottom:16px;}
.ob .bt{display:flex;gap:10px;}
.ob .bt .btn{flex:1;}
.ch{display:flex;flex-direction:column;gap:12px;padding:8px 14px;}
.el{text-align:center;padding:40px 20px;color:#bbb;font-size:14px;}
.lc{display:flex;gap:8px;margin:12px 0;}
.lc .lci{flex:1;padding:10px 6px;border-radius:10px;text-align:center;border:1.5px solid #e8e8e8;cursor:pointer;}
.lc .lci.on{border-color:#6C63FF;background:linear-gradient(135deg,#eef2ff,#e0e7ff);}
.lc .lci .lv{font-size:12px;color:#666;font-weight:500;}
.lc .lci .ld{font-size:10px;color:#bbb;margin-top:2px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:13px;color:#666;margin-bottom:4px;font-weight:500;}
.fg textarea{width:100%;padding:10px 12px;border:1px solid #e8e8e8;border-radius:8px;font-size:14px;outline:none;min-height:100px;resize:vertical;font-family:inherit;}
.fg textarea:focus{border-color:#6C63FF;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}
.mg .mi{background:#fff;border-radius:12px;padding:18px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:.15s;}
.mg .mi:active{transform:scale(.96);}
.mg .mi .mi-icon{font-size:26px;margin-bottom:4px;}
.mg .mi .mi-nm{font-size:13px;color:#1a1a1a;font-weight:500;}
.ag{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;border:1px solid #eee;}
.ag .agt{font-size:14px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:6px;}
.ag .agt .scnum{font-size:11px;color:#999;font-weight:400;}
.ag .ags{display:flex;gap:4px;margin-top:8px;}
.ag .ags .asi{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;background:#f5f6fa;border-radius:8px;}
.ag .ags .asi .sv{font-size:18px;font-weight:700;}
.ag .ags .asi .sd{font-size:10px;color:#999;margin-top:1px;}
.up{color:#52c41a;}
.dn{color:#ff4d4f;}
.in{display:none;}
/* typing animation */
.typing{display:flex;gap:4px;padding:4px 0;align-items:center;}
.typing .dot{width:6px;height:6px;background:#6C63FF;border-radius:50%;animation:pulse 1.2s infinite;}
.typing .dot:nth-child(2){animation-delay:.2s;}
.typing .dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{transform:scale(.4);opacity:.4;}40%{transform:scale(1);opacity:1;}}
/* inline comment bubble */
.cmt-bub{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-radius:8px;padding:6px 10px;font-size:12px;line-height:1.5;color:#333;margin-top:6px;border:1px solid #ffd591;max-width:85%;}
.cmt-bub .cmt-tag{color:#fa8c16;font-weight:500;}
/* page transitions */
.slide-in{animation:slideIn .25s ease forwards;}
.slide-out{animation:slideOut .25s ease forwards;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideOut{from{transform:translateX(-30%);opacity:1;}to{transform:translateX(-100%);opacity:0;}}
.slide-in-back{animation:slideInBack .25s ease forwards;}
.slide-out-back{animation:slideOutBack .25s ease forwards;}
@keyframes slideInBack{from{transform:translateX(-100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideOutBack{from{transform:translateX(30%);opacity:1;}to{transform:translateX(100%);opacity:0;}}
/* toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:all .3s ease;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* progress bar animate */
.bar-anim{transition:width 1.2s ease-out;}
.bar-anim-init{width:0!important;}
/* voice wave bars */
.wave-bars{display:inline-flex;gap:2px;align-items:center;height:16px;}
.wave-bars .bar{width:3px;background:#6C63FF;border-radius:2px;animation:waveAnim .8s infinite ease-in-out;}
.wave-bars .bar:nth-child(1){animation-delay:0s;height:6px;}
.wave-bars .bar:nth-child(2){animation-delay:.1s;height:10px;}
.wave-bars .bar:nth-child(3){animation-delay:.2s;height:14px;}
.wave-bars .bar:nth-child(4){animation-delay:.3s;height:8px;}
.wave-bars .bar:nth-child(5){animation-delay:.4s;height:12px;}
@keyframes waveAnim{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}
/* loading spinner */
.spinner{display:inline-flex;align-items:center;gap:8px;}
.spinner .ring{width:20px;height:20px;border:2px solid #e0e7ff;border-top-color:#6C63FF;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* cat filter scroll */
.cat-scroll{display:flex;gap:4px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-scroll .fbtn{flex-shrink:0;white-space:nowrap;}
/* exam tower ladder */
.tower{position:relative;display:flex;flex-direction:column;align-items:stretch;overflow:hidden;flex:1;background:linear-gradient(180deg,#eef2ff 0%,#fff7e6 40%,#fff 80%);}
.tower-scroll{position:relative;z-index:2;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:8px 14px 20px;}
.tower-scroll::-webkit-scrollbar{display:none;}
.tower-node{position:relative;z-index:2;display:flex;align-items:center;gap:8px;margin-bottom:2px;cursor:pointer;transition:transform .15s;}
.tower-node:active{transform:scale(.95);}
.tower-node.left{flex-direction:row;margin-right:auto;padding-left:24px;}
.tower-node.right{flex-direction:row-reverse;margin-left:auto;padding-right:24px;}
.tower-node .badge{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.tower-node .badge.locked{background:#e8e8e8;color:#aaa;box-shadow:none;}
.tower-node .badge.current{background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;box-shadow:0 2px 10px rgba(108,99,255,.4);animation:pulseBadge 2s infinite;}
.tower-node .badge.passed{background:linear-gradient(135deg,#52c41a,#73d13d);color:#fff;box-shadow:0 2px 6px rgba(82,196,26,.3);}
.tower-node .lv-info{flex:1;max-width:200px;}
.tower-node .lv-info .lv-name{font-size:13px;font-weight:600;color:#333;}
.tower-node .lv-info .lv-name.locked{color:#bbb;}
.tower-node .lv-stars{display:flex;gap:2px;font-size:14px;}
.tower-node .lv-stars .lit{color:#faad14;}
.tower-node .lv-stars .dim{color:#d9d9d9;}
.tower-line{position:relative;z-index:1;height:20px;width:3px;}
.tower-line.left-line{margin-left:46px;border-radius:1px;background:linear-gradient(180deg,#b7eb8f,#6C63FF);}
.tower-line.right-line{margin-right:46px;margin-left:auto;border-radius:1px;background:linear-gradient(180deg,#6C63FF,#b7eb8f);}
.tower-line.locked-line{background:#ddd!important;}
.tower-line .line-dot{position:absolute;width:10px;height:10px;border-radius:50%;left:-3px;background:#6C63FF;}
/* level detail panel */
.lv-detail{padding:14px;}
.lv-hero{text-align:center;padding:20px 16px;background:linear-gradient(135deg,#f0f5ff,#e0e7ff);border-radius:16px;margin-bottom:14px;}
.lv-hero .hero-icon{font-size:40px;margin-bottom:6px;}
.lv-hero .hero-title{font-size:16px;font-weight:700;color:#333;}
.lv-hero .hero-stars{display:flex;justify-content:center;gap:6px;margin-top:8px;font-size:20px;}
.diff-card{border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid #e8e8e8;transition:all .2s;}
.diff-card.available{border-color:#6C63FF;background:#f8f7ff;}
.diff-card.passed{border-color:#b7eb8f;background:#f6ffed;}
.diff-card.locked{opacity:.45;}
.diff-card .diff-label{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:6px;}
.diff-card .diff-label.easy{background:#f6ffed;color:#52c41a;}
.diff-card .diff-label.mid{background:#fff7e6;color:#fa8c16;}
.diff-card .diff-label.hell{background:#fff1f2;color:#ff4d4f;}
.diff-card .diff-name{font-size:14px;font-weight:600;color:#333;}
.diff-card .diff-threshold{font-size:12px;color:#999;margin-top:4px;}
.diff-card .diff-score{font-size:15px;font-weight:700;color:#52c41a;margin-top:4px;}
.diff-card .diff-btn{display:inline-block;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;margin-top:8px;}
.diff-card .diff-btn.go{background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;}
.diff-card .diff-btn.nogo{background:#f0f0f0;color:#999;cursor:default;}
.diff-card .diff-lock{font-size:12px;color:#999;margin-top:6px;}
/* empty state */
.empty-state{text-align:center;padding:40px 20px;color:#bbb;}
.empty-state .empty-icon{font-size:48px;margin-bottom:8px;opacity:.6;}
.empty-state .empty-text{font-size:14px;margin-bottom:12px;}
.empty-state .btn{font-size:13px;padding:8px 16px;}
@media(max-width:420px){body{padding:0;background:#fff;}.phone{width:100%;height:100vh;border-radius:0;box-shadow:none;}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="phone" id="app">
  <div class="status-bar"><span>09:41</span><span>📶 🔋 100%</span></div>
  <div class="app-header"><button class="back" id="backBtn" onclick="goback()">‹</button><span id="htitle">AI 陪练</span></div>
  <div class="app-content" id="ac">
    <!-- HOME -->
    <div class="screen active" id="s0">
      <div class="page">
        <div class="ib"><h2><span class="ic">🏋️</span> AI 陪练</h2><p>7×24 小时"AI客户"陪你练，练完有评分、有点评、有示范、能追问</p></div>
        <div class="qs"><div class="qi"><div class="n">8</div><div class="l">本月练习</div></div><div class="qi"><div class="n">76</div><div class="l">平均分</div></div><div class="qi"><div class="n">↑12</div><div class="l">较上月</div></div></div>
        <button class="btn btnp btnw btnl" onclick="resetCreatePage();setTitle('创建自定义场景');showPage('s10')" style="margin-bottom:10px;"><span class="ic ic-sm">✏️</span> 创建自定义场景</button>
        <div class="ts" id="sceneTab" style="margin-bottom:6px;">
          <div class="ti on" onclick="switchStab('preset')">📂 预设场景 <span style="font-size:10px;color:#999;">32</span></div>
          <div class="ti" onclick="switchStab('my')">📋 我的场景 <span style="font-size:10px;color:#999;" id="msc2">0</span></div>
        </div>
        <div id="presetSec">
          <div id="sl"></div>
        </div>
        <div id="mySec" style="display:none;">
          <div id="msl"></div>
        </div>
      </div>
    </div>
    <!-- DETAIL -->
    <div class="screen" id="s1"><div class="page" id="s1c"></div></div>
    <!-- CHAT -->
    <div class="screen" id="s2">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0;">
        <span id="chatn" style="font-size:14px;font-weight:500;">对练中</span>
        <button class="btn btno" style="padding:4px 12px;font-size:12px;" onclick="document.getElementById('endOV').classList.add('on')">结束对练</button>
      </div>
      <div id="chatProgress" style="padding:4px 14px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0;font-size:11px;color:#999;text-align:center;"></div>
      <div id="chatmsgs" class="ch" style="flex:1;overflow-y:auto;"></div>
      <div style="display:flex;gap:6px;padding:8px 10px;background:#fff;border-top:1px solid #eee;flex-shrink:0;align-items:center;" id="chatInputArea">
        <!-- Text mode -->
        <div id="textMode" style="display:flex;gap:6px;flex:1;align-items:center;">
          <input id="chatInput" type="text" placeholder="输入你的回答..." style="flex:1;padding:8px 12px;border:1px solid #e8e8e8;border-radius:20px;font-size:14px;outline:none;" onkeydown="if(event.key==='Enter')sendMsg()">
          <span onclick="switchVoiceMode()" style="width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#f0f0f0;cursor:pointer;font-size:18px;flex-shrink:0;transition:.2s;color:#666;" title="语音输入">🎤</span>
          <button class="btn btnp" style="padding:8px 16px;border-radius:20px;" onclick="sendMsg()">发送</button>
        </div>

  reversedMode = false;
  chatStep = 0;
  // curDiff already set by selLv, or defaults to 0 (初级)
  const s = curSc;
  const sk = scripts[s.n] || {a:['您好，我是今天跟您沟通的客户。','您说的我有点不太明白。','嗯，我考虑考虑吧。'],c:['✅ 开场自然','⚠️ 可以更通俗','❌ 没有挖掘真实顾虑'],cases:[[],[],[]]};
  let h = `<div style="text-align:center;font-size:11px;color:#bbb;padding:4px 0;">${s.n}</div>`;
  h += `<div class="msg ai"><div class="av">🤖</div><div class="bub" style="position:relative;">${sk.a[0]}<span class="spk" onclick="playVoice(event,this)" style="position:absolute;right:6px;top:6px;cursor:pointer;opacity:.5;font-size:12px;line-height:1;">🔊</span></div></div>`;
  document.getElementById('chatmsgs').innerHTML = h;
  document.getElementById('chatn').textContent = s.n;
  document.getElementById('chatInput').value = '';
  document.getElementById('chatInput').placeholder = '输入你的回答...';
  updateProgress();
  showPage('s2');
  setTimeout(() => {
    const s2 = document.querySelector('#chatmsgs .msg.ai .spk');
    if (s2) playVoice(null, s2);
  }, 400);
}

function sendMsg() {
  if (reversedMode) return sendReversedMsg();
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim();
  if(!txt) return;
  inp.value = '';
  const area = document.getElementById('chatmsgs');
  const s = curSc;
  const sk = scripts[s.n] || {a:['好的，那今天就先到这里？'],c:['✅ 完成对话'],cases:[[]]};
  // add user message
  area.innerHTML += `<div class="msg us"><div class="av">👤</div><div class="bub">${escHtml(txt)}</div></div>`;
  chatStep++;
  updateProgress();
  // add inline comment
  const prevCmt = sk.c && sk.c[chatStep] ? sk.c[chatStep] : '';
  if(prevCmt) {
    area.innerHTML += `<div class="cmt-bub"><span class="cmt-tag">💡 点评：</span>${prevCmt}</div>`;
  }
  // determine AI response
  let aiMsg;
  if(chatStep < sk.a.length) {
    aiMsg = sk.a[chatStep];
  } else {
    // free chat mode: generate contextual follow-up based on scenario category
    aiMsg = getFreeChatMsg(s, chatStep, txt);
  }
  // show "thinking" animation then reveal message
  const thinkId = 'think_' + Date.now();
  area.innerHTML += `<div class="msg ai" id="${thinkId}"><div class="av">🤖</div><div class="bub"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> <span style="font-size:12px;color:#999;">思考中...</span></div></div>`;
  area.scrollTop = area.scrollHeight;
  setTimeout(()=>{
    const el = document.getElementById(thinkId);
    if(el) {
      el.innerHTML = `<div class="av">🤖</div><div class="bub" style="position:relative;">${aiMsg}<span class="spk" onclick="playVoice(event,this)" style="position:absolute;right:6px;top:6px;cursor:pointer;opacity:.5;font-size:12px;line-height:1;">🔊</span></div>`;
      area.scrollTop = area.scrollHeight;
      const s2 = el.querySelector('.spk');
      if(s2) playVoice(null, s2);
    }
  }, 1200);
}

function getFreeChatMsg(scenario, step, userTxt) {
  const cat = scenario.c || '自定义';
  // difficulty determines pool: 0=初级(standard), 1=中级(mixed), 2=地狱(hard only)
  if(curDiff === 2) {
    const pool = freeChatHard[cat] || freeChatHard['自定义'];
    const idx = (step - 1) % pool.length;
    return pool[idx];
  } else if(curDiff === 1) {
    // mixed: alternate standard and hard
    const poolStd = freeChatPool[cat] || freeChatPool['自定义'];
    const poolHard = freeChatHard[cat] || freeChatHard['自定义'];
    const idx = (step - 1);
    return idx % 2 === 0 ? poolStd[idx % poolStd.length] : poolHard[idx % poolHard.length];
  }
  // 初级: standard cooperative pool
  const pool = freeChatPool[cat] || freeChatPool['自定义'];
  const idx = (step - 1) % pool.length;
  return pool[idx];
}

function updateProgress() {
  const s = curSc;
  const sk = scripts[s.n] || {a:['好的'],c:['✅'],cases:[[]]};
  const scriptedLen = sk.a.length;
  const el = document.getElementById('chatProgress');
  if(el) {
    if(chatStep <= scriptedLen) {
      const pct = Math.round((chatStep / scriptedLen) * 100);
      el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;justify-content:center;"><span>第${chatStep}轮</span><div style="width:60px;height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;"><div style="width:${Math.min(pct,100)}%;height:100%;background:linear-gradient(135deg,#6C63FF,#8B7CFA);border-radius:2px;transition:width .3s;"></div></div><span>脚本${pct}%</span></div>`;
    } else {
      el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;justify-content:center;"><span>第${chatStep}轮 · 自由对话</span><span style="color:#6C63FF;font-size:11px;">点击"结束对练"可随时结束</span></div>`;
    }
  }
}

function extractAgentMsg(sk, idx) {
  if (sk && sk.cases && sk.cases[idx] && sk.cases[idx].length > 0) {
    var msg = sk.cases[idx][0];
    msg = msg.replace(/^[^：]*?[：]/, '');
    return msg.trim();
  }
  return null;
}

function getGenericAgentMsg(step) {
  var msgs = [
    '您说得对，我完全理解您的想法。不过从专业角度来看，我建议您考虑一下这几个方面...',
    '这个顾虑很正常，很多客户一开始也是这么想的。我来帮您分析一下其中的关键点。',
    '您提的这个问题很好。其实这正是我们需要重点关注的地方，我给您详细解释一下。',
    '嗯，您说的有道理。那您看这样行不行，我们先从最基础的保障开始配置。',
    '好的，我完全明白您的意思了。综合来看，我建议的方案是这样的...'
  ];
  return msgs[step % msgs.length];
}

function sendReversedMsg() {
  var inp = document.getElementById('chatInput');
  var txt = inp.value.trim();
  if(!txt) return;
  inp.value = '';
  var area = document.getElementById('chatmsgs');
  area.innerHTML += '<div class="msg us"><div class="av">🤖</div><div class="bub" style="padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;background:linear-gradient(135deg,#6C63FF,#8B7CFA);color:#fff;border-top-right-radius:3px;">' + escHtml(txt) + '</div></div>';
  var s = curSc;
  var sk = scripts[s.n];
  chatStep++;
  var maxSteps = (sk && sk.cases) ? sk.cases.length : 4;
  if(chatStep < maxSteps) {
    var agentMsg = extractAgentMsg(sk, chatStep) || getGenericAgentMsg(chatStep);
    area.innerHTML += '<div class="msg ai"><div class="av">💼</div><div class="bub" style="position:relative;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;background:#fff;border:1px solid #eee;border-top-left-radius:3px;">' + agentMsg + '<span class="spk" onclick="playVoice(event,this)" style="position:absolute;right:6px;top:6px;cursor:pointer;opacity:.5;font-size:12px;line-height:1;">🔊</span></div></div>';
    setTimeout(function(){
      var spk = area.querySelector(".msg.ai:last-child .spk");
      if (spk) playVoice(null, spk);
    }, 300);
  }
  area.scrollTop = area.scrollHeight;
}

function confirmEnd() {
  if (reversedMode) endReversedPractice();
  else endPractice();
}

  document.getElementById('endOV').classList.remove('on');
  reversedMode = false;
  // update practice count for custom scenarios
  var s = curSc;
  if(s && s.id && s.id.startsWith('MY')) {
    var idx = parseInt(s.id.replace('MY',''));
    if(myScs[idx]) {
      myScs[idx].c++;
      localStorage.setItem('aiMyScs', JSON.stringify(myScs));
    }
  }
  setTitle('反转练习报告');
  var s = curSc;
  var sk = scripts[s.n];
  var r = '<div class="rb" style="text-align:center;"><div class="lb">🔁 AI代理人表现评估</div><div style="font-size:13px;color:#999;margin-top:4px;">看看AI代理人是如何专业回应的</div></div>';
  if (sk) {
    for (var i = 0; i < sk.a.length; i++) {

// VOICE PLAY
let voicePlaying = null;
function playVoice(e, el) {
  if (!el) { el = e; e = null; }
  if (e && e.stopPropagation) e.stopPropagation();
  if (voicePlaying === el) {
    el.innerHTML = '🔊';
    el.style.opacity = '.5';
    voicePlaying = null;
    return;
  }
  if (voicePlaying) { voicePlaying.innerHTML = '🔊'; voicePlaying.style.opacity = '.5'; }
  el.innerHTML = '<div class="wave-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>';
  el.style.opacity = '1';
  voicePlaying = el;
  clearTimeout(el._stopTimer);
  el._stopTimer = setTimeout(() => {
    if (voicePlaying === el) {
      el.innerHTML = '🔊';
      el.style.opacity = '.5';
      voicePlaying = null;
    }

}

// TREND LINE
const trendWeeks=['第1周','第2周','第3周','第4周'];
const trendTotal=[58,65,70,76];
const trendDims=[
  {name:'话术规范',data:[10,12,13,14],max:15,color:'#6C63FF'},
  {name:'销售逻辑',data:[13,15,16,17],max:20,color:'#fa8c16'},
  {name:'共情能力',data:[9,10,11,12],max:15,color:'#52c41a'},
  {name:'异议处理',data:[13,14,16,18],max:20,color:'#ff4d4f'},
  {name:'促成技巧',data:[12,14,15,16],max:20,color:'#eb2f96'},
  {name:'合规表现',data:[7,8,8,9],max:10,color:'#1890ff'}
];
let curTrendDim=-1; // -1=总分, 0~5=各维度
function drawTrend(dimIdx){
  curTrendDim=dimIdx;
  const c=document.getElementById('trendLine');
  if(!c) return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height;
  const padL=36,padR=16,padT=22,padB=28;
  const gw=w-padL-padR, gh=h-padT-padB;
  const isTotal=dimIdx===-1;
  const scores=isTotal?trendTotal:trendDims[dimIdx].data;
  const maxScore=isTotal?100:trendDims[dimIdx].max;
  const lineColor=isTotal?'#6C63FF':trendDims[dimIdx].color;
  const minV=isTotal?40:0;
  const maxV=maxScore;
  const range=maxV-minV;
  // update tabs highlight
  document.querySelectorAll('.trend-tab').forEach((tab,i)=>{
    const active=i===dimIdx+1; // tab 0=总分(dimIdx=-1), tab 1~6=维度0~5
    tab.style.background=active?lineColor:'#f5f6fa';
    tab.style.color=active?'#fff':'#666';
  });
  ctx.clearRect(0,0,w,h);
  // horizontal grid + labels
  ctx.font='9px sans-serif';ctx.fillStyle='#999';ctx.textAlign='right';
  const step=isTotal?20:Math.ceil(maxScore/5);
  for(let v=minV;v<=maxV;v+=step){
    const y=padT+gh-(v-minV)/range*gh;
    ctx.fillText(isTotal?v:v+'',padL-4,y+3);
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+gw,y);ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;ctx.stroke();
  }
  // week labels
  ctx.textAlign='center';ctx.fillStyle='#666';ctx.font='10px sans-serif';
  trendWeeks.forEach((wk,i)=>{
    const x=padL+i/(trendWeeks.length-1)*gw;
    ctx.fillText(wk,x,h-6);
  });
  // points
  const pts=scores.map((s,i)=>({
    x:padL+i/(scores.length-1)*gw,
    y:padT+gh-((s-minV)/range*gh)
  }));
  // gradient fill
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,padT+gh);ctx.lineTo(pts[0].x,padT+gh);ctx.closePath();
  const grad=ctx.createLinearGradient(0,padT,0,padT+gh);
  const baseColor=lineColor.replace('#','');
  const r=parseInt(baseColor.substring(0,2),16),g=parseInt(baseColor.substring(2,4),16),b=parseInt(baseColor.substring(4,6),16);
  grad.addColorStop(0,`rgba(${r},${g},${b},0.25)`);
  grad.addColorStop(1,`rgba(${r},${g},${b},0.02)`);
  ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  // dots + labels
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,2*Math.PI);ctx.fillStyle=lineColor;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,2,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
    ctx.font='bold 10px sans-serif';ctx.fillStyle=lineColor;ctx.textAlign='center';
    const label=isTotal?scores[i]+'分':scores[i]+'/'+maxScore;
    ctx.fillText(label,p.x,p.y-10);
  });
}

// RADAR
function drawRadar(id,vals) {
  const c = document.getElementById(id);
  if(!c) return;
  const ctx = c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2,r=Math.min(w,h)/2-50,n=dims.length,st=2*Math.PI/n,off=-Math.PI/2;
  if(c._raf) cancelAnimationFrame(c._raf);
  const dur=1800,start=performance.now();
  function frame(now){
    const t=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-t,3);
    ctx.clearRect(0,0,w,h);
    // grid
    for(let ri=1;ri<=4;ri++){
      ctx.beginPath();const rr=r*ri/4;
      for(let i=0;i<=n;i++){const a=off+i*st;i===0?ctx.moveTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));}
      ctx.strokeStyle='#e8e8e8';ctx.lineWidth=1;ctx.stroke();
    }
    for(let i=0;i<n;i++){const a=off+i*st;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='#e8e8e8';ctx.stroke();}
    // polygon expanding from center
    ctx.beginPath();
    for(let i=0;i<=n;i++){const idx=i%n,a=off+idx*st,v=vals[idx]*ease/100*r;i===0?ctx.moveTo(cx+v*Math.cos(a),cy+v*Math.sin(a)):ctx.lineTo(cx+v*Math.cos(a),cy+v*Math.sin(a));}
    ctx.fillStyle='rgba(108,99,255,0.15)';ctx.fill();ctx.strokeStyle='#6C63FF';ctx.lineWidth=2.5;ctx.stroke();
    // labels fade in
    ctx.globalAlpha=ease;
    ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';
    for(let i=0;i<n;i++){const a=off+i*st;ctx.fillText(dims[i],cx+(r+22)*Math.cos(a),cy+(r+22)*Math.sin(a)+4);}
    // dots
    ctx.globalAlpha=1;
    for(let i=0;i<n;i++){const a=off+i*st,v=vals[i]*ease/100*r;
      ctx.beginPath();ctx.arc(cx+v*Math.cos(a),cy+v*Math.sin(a),3+ease*2,0,2*Math.PI);ctx.fillStyle='#6C63FF';ctx.fill();
    }
    ctx.globalAlpha=1;
    if(t<1) c._raf=requestAnimationFrame(frame);
  }
  c._raf=requestAnimationFrame(frame);
}

// HISTORY
function renderHL(f) {
  // build aggregation cards for scenes with multiple records
  let h = '';
  const sceneCounts = {};
  hdata.forEach(d => { sceneCounts[d.sc] = (sceneCounts[d.sc]||0) + 1; });
  const multiScenes = Object.entries(sceneCounts).filter(([_,c])=>c>=2).sort((a,b)=>b[1]-a[1]);
  if(multiScenes.length > 0) {
    multiScenes.forEach(([scId, count])=>{
      const s = SC.find(x=>x.id===scId);
      const records = hdata.filter(d=>d.sc===scId).sort((a,b)=>a.dt.localeCompare(b.dt));
      const first=records[0].sc2, last=records[records.length-1].sc2;
      const diff=last-first;
      const trendColor=diff>=0?'#52c41a':'#ff4d4f';
      const trendIcon=diff>=0?'↑':'↓';
      h += `<div class="ag" onclick="showAgg('${scId}')"><div class="agt"><span class="ic ic-sm">📈</span> ${s?s.n:scId} <span class="scnum">${count}次</span></div><div style="display:flex;align-items:center;gap:4px;margin-top:6px;font-size:12px;color:#999;">${records.map((r,i)=>{
        const color = r.sc2>=80?'#52c41a':r.sc2>=65?'#fa8c16':'#ff4d4f';
        return `<span style="color:${color};font-weight:600;">${r.sc2}</span>`;
      }).join('<span style="color:#ccc;">→</span>')}</div></div>`;
    });
  }
  let data = [...hdata];
  if(f==='今天') data=data.filter(d=>d.dt.startsWith('2026-07-02'));
  else if(f==='本周') data=data.filter(d=>d.dt>='2026-06-29');
  else if(f==='本月') data=data.filter(d=>d.dt.startsWith('2026-07')||d.dt.startsWith('2026-06'));
  // individual records: skip scenes that are already aggregated (≥2 records)
  const aggregatedScenes = new Set(multiScenes.map(([scId])=>scId));
  data = data.filter(d => !aggregatedScenes.has(d.sc));
  data.forEach(d=>{
    const s=SC.find(x=>x.id===d.sc);
    const cl=d.sc2>=80?'#52c41a':d.sc2>=65?'#fa8c16':'#ff4d4f';
    h += `<div class="sc" onclick="showHistoryDetail(${d.id})"><div class="sct"><span class="nm">${d.sc} ${s?s.n:''}</span><span style="font-weight:700;color:${cl};font-size:18px;">${d.sc2}</span></div><div style="display:flex;gap:8px;font-size:11px;color:#999;margin-top:2px;"><span>${d.dt}</span><span>${d.lv}</span><span>${d.tm}</span><span>${d.rd}轮</span></div></div>`;
  });

}

  records.forEach((r,i)=>{
    const color = r.sc2>=80?'#52c41a':r.sc2>=65?'#fa8c16':'#ff4d4f';
    trendHtml += (i>0?' → ':'') + `<span style="font-size:28px;color:${color};font-weight:700;">${r.sc2}</span>`;
  });
  trendHtml += '</div>';
  // dimension bars (simulated improvement from first to last)
  const firstScore = records[0].sc2;
  const lastScore = records[count-1].sc2;
  const seed = parseInt(scId.replace('S',''));
  const dimW = [15,20,15,20,20,10];
  const firstEarned = dimW.map((w,i)=>Math.max(Math.round(w*0.5), Math.round(w*((seed+i*7)%100)/100*0.35+w*0.5)));
  const lastEarned = dimW.map((w,i)=>Math.min(w, firstEarned[i]+Math.round(w*((seed+i*3)%10)/10*0.3)));
  let dimHtml = '';
  dims.forEach((d,i)=>{
    const pct = Math.round(lastEarned[i]/dimW[i]*100);
    const diff = lastEarned[i]-firstEarned[i];
    const cl = diff>=8?'#52c41a':diff>=4?'#fa8c16':'#ddd';
    dimHtml += `<div class="di"><span class="dn">${d}</span><div class="db"><div class="fl bar-anim bar-anim-init" style="width:${pct}%;background:${cl};"></div></div><span class="ds ${diff>0?'up':'dn'}">${diff>0?'↑':''}${diff}</span></div>`;

  let recListHtml = '';

function doCmp(scId) {
  if(_cmpSelected.length!==2) return;
  setTitle('对比结果');
  const s = SC.find(x=>x.id===scId);
  const allRecs = hdata.filter(d=>d.sc===scId).sort((a,b)=>a.dt.localeCompare(b.dt));

  const nthB = allRecs.findIndex(r=>r.id===rB.id)+1;

  const clB = rB.sc2>=80?'#52c41a':rB.sc2>=65?'#fa8c16':'#ff4d4f';
  // dialog comparison

  // pick which is "better" based on score
  const isABetter = rA.sc2 >= rB.sc2;
  const betterResp = isABetter ? goodResp : badResp;
  const worseResp = isABetter ? badResp : goodResp;
  const betterLabel = isABetter ? `第${nthA}次` : `第${nthB}次`;
  const worseLabel = isABetter ? `第${nthB}次` : `第${nthA}次`;
  // dimension comparison
  const dimWeights2 = [15,20,15,20,20,10];

  const earnedA = dimWeights2.map((w,i)=>{const b=Math.round(w*((seedA+i*7)%100)/100*0.35+w*0.6);return Math.max(Math.round(w*0.5),Math.min(w,b));});
  const earnedB = dimWeights2.map((w,i)=>{const b=Math.round(w*((seedB+i*7)%100)/100*0.35+w*0.6);return Math.max(Math.round(w*0.5),Math.min(w,b));});
  // normalize
  earnedA.forEach((v,i)=>{if(i===3){earnedA[i]=rA.sc2-earnedA.reduce((a,b,j)=>j===3?a:a+b,0);earnedA[i]=Math.max(Math.round(dimWeights2[3]*0.5),Math.min(dimWeights2[3],earnedA[i]));}});
  earnedB.forEach((v,i)=>{if(i===3){earnedB[i]=rB.sc2-earnedB.reduce((a,b,j)=>j===3?a:a+b,0);earnedB[i]=Math.max(Math.round(dimWeights2[3]*0.5),Math.min(dimWeights2[3],earnedB[i]));}});
  const dims2 = ['异议处理','需求挖掘','产品讲解','促成能力','沟通表达','合规意识'];

function saveMySc() {
  // extract clean short description from profile
  const lines = genData.profile.split('\n').filter(l=>l.trim());
  const descLines = lines.filter(l=>l.includes('：') || l.includes(':')).map(l=>l.replace(/[•\s]+/g,'').split(/[：:]/)[1] || l.replace(/[•\s]+/g,''));
  const desc = descLines.slice(0,3).join('，') || genData.name;
  myScs.push({n:genData.name, d:desc, dt:new Date().toISOString().slice(0,10), c:0, profile:genData.profile, rules:genData.rules, criteria:genData.criteria});
  localStorage.setItem('aiMyScs', JSON.stringify(myScs));
  renderMySc();
  showToast('✅ 已保存到「我的场景」');
  // clear navStack so back button won't return to create page
  navStack = [];
  swtch('home');
  switchStab('my');
}

function scrollToUnfinished(){
  const scroll=document.querySelector('.tower-scroll');
  if(!scroll) return;
  const nodes=document.querySelectorAll('.tower-node');
  // nodes[0]=level14(top), nodes[14]=level0(bottom) — reversed mapping
  // find first unlocked level with stars<3, starting from level 0 (bottom)
  for(let lv=0;lv<EXAM_TOTAL;lv++){
    if(lvStars(lv)<3 && lvUnlocked(lv)){
      const node=nodes[EXAM_TOTAL-1-lv]; // reverse mapping
      if(!node) continue;
      const nodeTop=node.offsetTop-scroll.offsetTop;
      const center=nodeTop-scroll.clientHeight/2+node.clientHeight/2;
      scroll.scrollTop=Math.max(0,center);
      return;
    }
  }
  scroll.scrollTop=0;
}

function showLvDetail(lv){
  setTitle(`第${lv+1}关 · ${examLv[lv].name}`);
  const e=examLv[lv];
  const stars=lvStars(lv);
  const s=SC.find(x=>x.id===e.sc);
  let h=`<div class="lv-detail"><div class="lv-hero"><div class="hero-icon">${e.icon}</div><div class="hero-title">第${lv+1}关 · ${e.name}</div><div style="font-size:12px;color:#999;margin-top:2px;">${s?s.d:''}</div><div class="hero-stars">`;
  for(let d=0;d<3;d++) h+=d<stars?'<span class="lit">⭐</span>':'<span class="dim">☆</span>';
  h+=`</div></div>`;
  for(let d=0;d<3;d++){
    const passed=stars>=d+1;
    const unlocked=diffUnlocked(lv,d);
    const cls=passed?'passed':unlocked?'available':'locked';
    const th=e.diffs[d];
    const scoreData=examProg[lv+'_d'+d];
    h+=`<div class="diff-card ${cls}"><span class="diff-label ${diffColors[d]}">${diffNames[d]}</span><div class="diff-name">${diffIcons[d]} ${e.name}</div><div class="diff-threshold">通过标准：≥${th}分</div>`;
    if(passed && scoreData) h+=`<div class="diff-score">✅ 已通过 · ${scoreData.score}分</div>`;
    if(passed && !scoreData) h+=`<div class="diff-score">✅ 已通过</div>`;
    if(!passed && unlocked) h+=`<span class="diff-btn go" onclick="startExamChal(${lv},${d})">开始挑战</span>`;
    if(!passed && !unlocked){
      let reason='';
      if(!lvUnlocked(lv)) reason=`需先通过第${lv}关`;
      else if(d>0) reason=`需先通过${diffNames[d-1]}`;
      h+=`<div class="diff-lock">🔒 ${reason}</div>`;
    }
    h+=`</div>`;
  }
  h+=`<div style="text-align:center;margin-top:16px;"><button class="btn btno btnw" onclick="renderTower();setTitle('闯关');navStack.length=0;navStack.push('s9');showPage('s9');document.querySelector('.app-header .back').style.display='none';">返回天梯</button></div></div>`;
  document.getElementById('exm').innerHTML=h;
}

function startExamChal(lv,d){
  examMode = true;
  _examChal = {lv:lv, d:d};
  _examLv = lv;
  curDiff = d;
  const s = SC.find(x=>x.id===examLv[lv].sc);
  curSc = s || {n:examLv[lv].name, c:'异议处理', id:examLv[lv].sc};
  // directly start chat, skip detail page
  reversedMode = false;
  chatStep = 0;
  const sk = scripts[curSc.n] || {a:['您好，我是今天跟您沟通的客户。','您说的我有点不太明白。','嗯，我考虑考虑吧。'],c:['✅ 开场自然','⚠️ 可以更通俗','❌ 没有挖掘真实顾虑'],cases:[[],[],[]]};
  const diffLabel = ['初级','中级','地狱'][d];
  let h = `<div style="text-align:center;font-size:11px;color:#bbb;padding:4px 0;">${curSc.n} · ${diffLabel}</div>`;
  h += `<div class="msg ai"><div class="av">🤖</div><div class="bub" style="position:relative;">${sk.a[0]}<span class="spk" onclick="playVoice(event,this)" style="position:absolute;right:6px;top:6px;cursor:pointer;opacity:.5;font-size:12px;line-height:1;">🔊</span></div></div>`;

  updateProgress();

  setTimeout(()=>{
    const s2 = document.querySelector('#chatmsgs .msg.ai .spk');
    if(s2) playVoice(null, s2);
  }, 400);
}

function backToExam(){
  examMode = false;
  _examChal = null;

  navStack.length = 0;
  navStack.push('s9');
  showPage('s9');
}

function checkExamResult(score){
  if(!examMode)return;
  if(!_examChal)return;
  const{lv,d}=_examChal;
  const th=examLv[lv].diffs[d];
  const curStars=lvStars(lv);
  if(score>=th && curStars<d+1){
    examProg[lv]=d+1;
    examProg[lv+'_d'+d]={score:score};
    saveExamProg();
    if(d+1===3) showToast(`🏆 完美通关！${examLv[lv].name} 地狱难度达成！`);
    else showToast(`🎉 ${diffNames[d]}通过！${examLv[lv].name} 获得${d+1}⭐`);
    if(lv<4 && curStars===0) showToast(`🔓 第${lv+2}关已解锁！`);
  } else if(score<th){
    showToast(`💪 还差${th-score}分！${diffNames[d]}需要≥${th}分`);
  } else {
    showToast(`✅ 已获得${curStars}⭐`);
  }
  _examChal=null;
}

      <div style="font-size:13px;display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;"><span>🥇 张明</span><span style="color:#52c41a;">✅ 已完成（85分）</span></div>
      <div style="font-size:13px;display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;"><span>🥈 李芳</span><span style="color:#52c41a;">✅ 已完成（72分）</span></div>
      <div style="font-size:13px;display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;"><span>🥉 王强</span><span style="color:#fa8c16;">🔄 进行中（练习2次）</span></div>
      <div style="font-size:13px;display:flex;justify-content:space-between;padding:6px 0;"><span>📌 赵丽</span><span style="color:#999;">⏳ 未开始</span></div>
    </div>`;
  document.getElementById('dpt').innerHTML = '';
  document.getElementById('rts').style.display = 'none';

}

// FILTERS
function initFilters() {
  const fb = document.getElementById('hfb');
  const fs = ['全部','今天','本周','本月'];
  fb.innerHTML = fs.map(f => `<span class="fbtn ${f==='全部'?'on':''}" onclick="filterHL('${f}',this)">${f}</span>`).join('') + '<span class="fbtn search-btn" onclick="openSearchHL()">🔍</span>';
}

function openSearchHL() {
  document.getElementById('hfb').classList.add('hide');
  document.getElementById('hsearch').classList.add('on');
  document.getElementById('hsearchInput').focus();
}

function closeSearchHL() {
  document.getElementById('hfb').classList.remove('hide');
  document.getElementById('hsearch').classList.remove('on');
  document.getElementById('hsearchInput').value = '';
  // restore to "全部" filter
  document.querySelectorAll('#hfb .fbtn').forEach(x=>x.classList.remove('on'));
  document.querySelector('#hfb .fbtn:first-child').classList.add('on');
  renderHL('全部');
}

function searchHL() {
  const kw = document.getElementById('hsearchInput').value.trim().toLowerCase();
  if(!kw) { renderHL('全部'); return; }
  let h = '';
  const sceneCounts = {};
  hdata.forEach(d => { sceneCounts[d.sc] = (sceneCounts[d.sc]||0) + 1; });
  const multiScenes = Object.entries(sceneCounts).filter(([_,c])=>c>=2).sort((a,b)=>b[1]-a[1]);
  // aggregation cards that match keyword
  const matchedMulti = multiScenes.filter(([scId])=>{
    const s = SC.find(x=>x.id===scId);
    const name = s ? s.n.toLowerCase() : '';
    return scId.toLowerCase().includes(kw) || name.includes(kw);
  });
  if(matchedMulti.length > 0) {
    matchedMulti.forEach(([scId, count])=>{
      const s = SC.find(x=>x.id===scId);
      const records = hdata.filter(d=>d.sc===scId).sort((a,b)=>a.dt.localeCompare(b.dt));
      const first=records[0].sc2, last=records[records.length-1].sc2;
      const diff=last-first;
      const trendColor=diff>=0?'#52c41a':'#ff4d4f';
      const trendIcon=diff>=0?'↑':'↓';
      h += `<div class="ag" onclick="showAgg('${scId}')"><div class="agt"><span class="ic ic-sm">📈</span> ${s?s.n:scId} <span class="scnum">${count}次</span></div><div style="display:flex;align-items:center;gap:4px;margin-top:6px;font-size:12px;color:#999;">${records.map((r,i)=>{
        const color = r.sc2>=80?'#52c41a':r.sc2>=65?'#fa8c16':'#ff4d4f';
        return `<span style="color:${color};font-weight:600;">${r.sc2}</span>`;
      }).join('<span style="color:#ccc;">→</span>')}</div></div>`;
    });
  }
  // individual records that match keyword
  hdata.forEach(d=>{
    const s=SC.find(x=>x.id===d.sc);
    const name = s?s.n:'';
    const searchable = `${d.sc} ${name} ${d.sc2}分 ${d.lv} ${d.dt} ${d.tm} ${d.rd}轮`.toLowerCase();
    if(!searchable.includes(kw)) return;
    const cl=d.sc2>=80?'#52c41a':d.sc2>=65?'#fa8c16':'#ff4d4f';
    h += `<div class="sc" onclick="showHistoryDetail(${d.id})"><div class="sct"><span class="nm">${d.sc} ${name}</span><span style="font-weight:700;color:${cl};font-size:18px;">${d.sc2}</span></div><div style="display:flex;gap:8px;font-size:11px;color:#999;margin-top:2px;"><span>${d.dt}</span><span>${d.lv}</span><span>${d.tm}</span><span>${d.rd}轮</span></div></div>`;
  });
  if(!h) h = '<div class="empty-state"><div class="empty-icon">🔍</div><div>没有找到相关记录</div><div style="font-size:12px;margin-top:4px;">试试其他关键词</div></div>';
  document.getElementById('hl').innerHTML = h;
}

// UTILITY
function escHtml(s) {return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}

initFilters();
initKB();
initExam();
initMe();

  const c = document.getElementById('rcg');
  if(c) drawRadar('rcg',[78,65,70,62,68,90]);
  drawTrend(-1);
},200);
</script>
